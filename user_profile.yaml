# -----------------------------------------------------------------------------
# Job preferences — used for filtering and the Claude AI prompt
# -----------------------------------------------------------------------------
job_preferences:
  type: "internship"               # internship | full-time
  paid_only: true
  preferred_locations:
    - "Remote"
    - "Hyderabad"
    - "India"
  roles:
    - "Python Backend Developer Intern"
    - "FastAPI Developer Intern"
    - "Backend Engineer Intern"
    - "Software Engineer Intern (Python)"
    - "AI/ML Engineer Intern"
    - "Full Stack Developer Intern"
    - "MERN Stack Intern"
  # Jobs containing ANY of these words will be dropped before export
  exclude_keywords:
    - "unpaid"
    - "no stipend"
    - "3+ years"
    - "5+ years"
    - "senior"
    - "manager"
    - "lead"
    - "director"
    - "principal"
    - "us only"
    - "uk only"
    - "canada only"

# -----------------------------------------------------------------------------
# Search keywords — each keyword triggers one actor run per enabled source
# Keep to 3–4 to avoid excessive Apify compute cost
# -----------------------------------------------------------------------------
search:
  keywords:
    - "python backend developer intern India"
    - "fastapi intern India"
    - "software engineer intern India"
    - "machine learning intern India"
    - "full stack developer intern India"
  max_results_per_actor: 30   # keep low to stay within $5 free tier

  # Internshala is category-based (not keyword). These map to its job_category field.
  internshala_categories:
    - "Software Development"
    - "Machine Learning"
    - "Web Development / Designing"

# -----------------------------------------------------------------------------
# Apify actor configuration
# Find actor IDs at https://console.apify.com/store
# Set enabled: false to skip a source
# Adjust input_template fields to match the actor's input schema
# -----------------------------------------------------------------------------
apify_actors:

  linkedin_jobs:
    enabled: true
    # Confirmed actor: https://console.apify.com/actors/hKByXkMQaC5Qt9UMN
    # $1.00/1K — "urls" field (plain URL strings) injected by job_finder.py
    actor_id: "curious_coder/linkedin-jobs-scraper"
    input_template:
      count: 25
      scrapeCompany: true
      splitByLocation: false

  linkedin_posts:
    enabled: true
    # Free actor, no cookies/login needed — 8.9K uses, 4.6 rating
    # Input: "query" injected by job_finder.py
    actor_id: "apimaestro/linkedin-posts-search-scraper-no-cookies"
    input_template:
      count: 20

  indeed:
    enabled: true
    # Confirmed actor: https://console.apify.com/actors/hMvNSpz3InHgI5jlch
    # ⚠️ $6.00/1K — most expensive. 2 keywords × 20 = ~$0.24
    actor_id: "misceres/indeed-scraper"
    input_template:
      country: "IN"            # 2-letter ISO code (schema example uses "US", not "United States")
      location: "India"
      maxItemsPerSearch: 20
      followApplyRedirects: false
      parseCompanyDetails: false
      saveOnlyUniqueItems: true

  naukri:
    enabled: true
    # automation-lab/naukri-scraper — 1.6K users, most widely used
    # "keyword" injected per-run by job_finder.py
    actor_id: "automation-lab/naukri-scraper"
    input_template:
      location: "India"
      maxJobs: 30              # correct field name (not maxResults)
      experienceMin: 0         # 0 = fresher/intern roles only

  internshala:
    enabled: true
    # bareezh_codes/internshala-scrapper — 478 users, most popular Internshala actor
    # job_category is injected per-run from search.internshala_categories above
    actor_id: "bareezh_codes/internshala-scrapper"
    input_template:
      location: ""          # empty = all India
      max_results: 30
      pages_to_scrape: 5
      part_time: false
      work_from_home: true  # include remote/WFH internships

  wellfound:
    enabled: false
    # Disabled: crawlerbros actor returns 0 items (doesn't accept keyword input)
    # Claude searches wellfound.com directly via web search in the prompt instead
    actor_id: "crawlerbros/wellfound-scraper"
    input_template:
      location: "India"
      maxResults: 25

  glassdoor:
    enabled: false
    # Disabled: Glassdoor has almost no India jobs (got 0 results) and costs $0.63/run
    # Re-enable if you want to search US/global roles
    actor_id: "crawlerbros/glassdoor-jobs-scraper"
    input_template:
      location: "India"
      maxItems: 25
